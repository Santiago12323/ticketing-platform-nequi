spring:
  cloud:
    aws:
      region:
        static: us-west-2

      credentials:

      
      sqs:
        inventory-request-queue: ${INVENTORY_REQUEST_QUEUE_URL}
        inventory-response-queue: ${INVENTORY_RESPONSE_QUEUE_URL}
        inventory-request-dlq: ${INVENTORY_REQUEST_DLQ_URL}
        order-ttl-queue: ${ORDER_TTL_QUEUE_URL}
        inventory-ttl-queue: ${INVENTORY_TTL_QUEUE_URL}

      sns:
        order-expiration-topic: ${ORDER_EXPIRATION_TOPIC_ARN}

      dynamodb:
        idempotency-table: ${IDEMPOTENCY_TABLE}
        idempotency-ttl-seconds: 3600

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

app:
  messaging:
    sqs:
      inventory-queue-url: ${INVENTORY_REQUEST_QUEUE_URL}
      response-queue-url: ${INVENTORY_RESPONSE_QUEUE_URL}
      message-group-id: order

    retry:
      max-attempts: 3
      backoff-millis: 100

    audit:
      enabled: true

ticketing:
  cache:
    ttl-minutes: 5

  statemachine:
    audit-enabled: true

logging:
  level:
    root: INFO
    com.nequi: INFO