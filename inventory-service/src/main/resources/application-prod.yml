ticketing:
  statemachine:
    audit-enabled: false

aws:
  region: ${AWS_REGION}
  access-key: ${AWS_ACCESS_KEY_ID}
  secret-key: ${AWS_SECRET_ACCESS_KEY}
  dynamodb:
    table-orders: ${DYNAMODB_TABLE_ORDERS:orders}
    table-events: ${DYNAMODB_TABLE_EVENTS:events}
    table-inventory: ${DYNAMODB_TABLE_INVENTORY:inventory}
    table-outbox: ${DYNAMODB_TABLE_OUTBOX:outbox}
  sqs:
    queue-url: ${SQS_QUEUE_URL}
    dead-letter-queue-url: ${SQS_DLQ_URL}

spring:
  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD}

logging:
  level:
    root: WARN
    com.nequi: INFO
