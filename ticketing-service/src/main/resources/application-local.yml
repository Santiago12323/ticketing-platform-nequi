spring:
  data:
    redis:
      host: localhost
      port: 6379
      password: SuperSecret123
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          max-wait: -1ms

  cloud:
    aws:
      region:
        static: us-east-1
      credentials:
        access-key: dummy
        secret-key: dummy
      sqs:
        endpoint: http://sqs.us-east-1.localhost.localstack.cloud:4566
      dynamodb:
        endpoint: http://localhost:8000

aws:
  sqs:
    inventory-request-queue: http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/inventory-request-queue
    inventory-response-queue: http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/inventory-response-queue

ticketing:
  statemachine:
    audit-enabled: true
    cache-ttl-minutes: 5

logging:
  level:
    root: INFO
    com.nequi: INFO
    org.springframework.statemachine: DEBUG
    io.awspring.cloud.sqs: DEBUG
    org.springframework.data.redis: DEBUG