name: "Senior GitOps: Amazon Corretto 25 - Nequi Edition"

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]

jobs:
  # 1. VALIDACIÓN DE INFRAESTRUCTURA (IaC) - Resiliente
  terraform-audit:
    name: "Audit: Terraform & IaC"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Validate
        # Usamos continue-on-error para que el pipeline no muera si falla el init/plan por falta de AWS real
        continue-on-error: true
        run: |
          cd terraform
          terraform init -backend=false
          terraform validate

      - name: Terraform Plan (Dry Run)
        continue-on-error: true
        run: |
          cd terraform
          terraform plan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID || 'mock_id' }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY || 'mock_key' }}
          AWS_DEFAULT_REGION: us-east-1

  # 2. SEGURIDAD ESTÁTICA (SCA)
  security:
    name: "Security: SCA Scan"
    needs: terraform-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Check (OWASP)
        uses: owasp/dependency-check-action@main
        with:
          project: 'Ticketing-Platform'
          path: '.'
          format: 'HTML'

  # 3. BUILD, TEST & COVERAGE (Corretto 25)
  build-and-verify:
    name: "Build & Jacoco: Java 25"
    needs: security
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [inventory-service, ticketing-service]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Amazon Corretto 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'corretto'
          cache: 'maven'

      - name: Maven Verify (Unit & Integration)
        run: |
          cd ${{ matrix.service }}
          # Forzamos el release 25 para garantizar compatibilidad con el runtime
          mvn clean verify -Dmaven.compiler.release=25

      - name: "Jacoco Gate: >85% Coverage"
        run: |
          cd ${{ matrix.service }}
          if [ -f target/site/jacoco/jacoco.csv ]; then
            COVERAGE=$(awk -F, '{ i += $4 + $5; m += $4 } END { if (i > 0) print (1 - m/i) * 100; else print 0 }' target/site/jacoco/jacoco.csv)
            echo "Current Coverage for ${{ matrix.service }}: $COVERAGE%"
            # Validación numérica con bc para decimales
            if (( $(echo "$COVERAGE < 85" | bc -l) )); then
              echo "::error::Coverage $COVERAGE% is below 85% threshold. Quality Gate Failed."
              exit 1
            fi
          else
            echo "::error::Jacoco report (CSV) not found. Check your pom.xml configuration."
            exit 1
          fi

  # 4. DAST (Dynamic Security Testing)
  dast-scan:
    name: "Security: DAST Scan"
    needs: build-and-verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 25 for Runtime
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'corretto'

      - name: Run Microservice Mock
        run: |
          # Levantamos el ticketing-service como ejemplo para el scan
          cd ticketing-service/target
          java -jar *.jar & 
          echo "Waiting for Spring Boot to start..."
          sleep 45 

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8080'
          fail_action: false # No bloqueamos la demo si hay alertas menores de ZAP