name: "nequi test"

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]

jobs:
  terraform-audit:
    name: "Audit: Terraform & IaC"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform Init & Validate
        continue-on-error: true
        run: |
          cd terraform
          terraform init -backend=false
          terraform validate
      - name: Terraform Plan
        continue-on-error: true
        run: |
          cd terraform
          terraform plan

  security:
    name: "Security: SCA Scan"
    needs: terraform-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dependency Check (SCA)
        uses: jeremylong/DependencyCheck.action@main
        with:
          project: 'Ticketing-Platform'
          path: '.'
          format: 'HTML'
          out: 'reports'
        continue-on-error: true

  build-and-verify:
    name: "Build & Jacoco: Java 25"
    needs: security
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [inventory-service, ticketing-service]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Amazon Corretto 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'corretto'
          cache: 'maven'
      - name: Maven Verify
        run: |
          cd ${{ matrix.service }}
          mvn clean verify -Dmaven.compiler.release=25
      - name: "Jacoco Gate: >85% Coverage"
        shell: bash
        run: |
          cd ${{ matrix.service }}
          REPORT_PATH="target/site/jacoco/jacoco.csv"
          if [ -f "$REPORT_PATH" ]; then
            COVERAGE=$(awk -F, '{ i += $4 + $5; m += $4 } END { if (i > 0) print (1 - m/i) * 100; else print 0 }' "$REPORT_PATH")
            echo "Current Coverage: $COVERAGE%"
            if (( $(echo "$COVERAGE < 85" | bc -l) )); then
              echo "::error::Coverage $COVERAGE% is below 85% threshold."
              exit 1
            fi
          else
            echo "::error::Jacoco report not found."
            exit 1
          fi

  deploy-aws-mock:
    name: "Deploy: AWS Simulation"
    needs: build-and-verify
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: AWS Login Simulation
        run: |
          echo "Intentando conexión con AWS ECR..."
          exit 1
      - name: Push Image Simulation
        run: |
          echo "Subiendo imagen a Amazon ECR..."
      - name: ECS Update Service
        run: |
          echo "Actualizando servicio en Fargate..."

  dast-scan:
    name: "Security: DAST Scan"
    needs: build-and-verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'corretto'
      - name: Run Microservice Mock
        run: |
          cd ticketing-service/target
          java -jar *.jar & 
          sleep 45
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8080'
          fail_action: false